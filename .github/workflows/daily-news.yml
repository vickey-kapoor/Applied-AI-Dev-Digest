name: Daily AI Research Digest

# Sends daily AI research digest to Telegram

on:
  schedule:
    # Run daily at 10:00 AM CST (16:00 UTC)
    - cron: '0 16 * * *'
    # Sunday weekly digest at 10:00 AM CST (16:00 UTC)
    - cron: '0 16 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Validate secrets
        run: |
          missing=""
          [ -z "${{ secrets.OPENAI_API_KEY }}" ] && missing="$missing OPENAI_API_KEY"
          [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && missing="$missing TELEGRAM_BOT_TOKEN"
          [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ] && missing="$missing TELEGRAM_CHAT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run news alert
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: python main.py

      - name: Commit and push reports and data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "Add daily research digest for $(date +'%d-%b-%Y')"
          git push

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Daily AI Research Digest pipeline failed. Check the logs above for details."

  weekly-digest:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 16 * * 0'
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KV_REST_API_URL: ${{ secrets.KV_REST_API_URL }}
          KV_REST_API_TOKEN: ${{ secrets.KV_REST_API_TOKEN }}
        run: python weekly_digest.py

      - name: Annotate on failure
        if: failure()
        run: |
          echo "::error::Weekly digest pipeline failed. Check the logs above for details."
